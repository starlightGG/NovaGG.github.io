<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <script src="../js/global.js"></script>
    <script id="cloning-script" src="../js/cloner.js"></script>
    <script src="../js/settings.js"></script>
    <script src="../js/fixing.js"></script>

<style>
    /* --- 1. Core Variables (Light Default & Nova Cosmic Dark) --- */
    :root {
        /* Light Theme (Default) */
        --bg-color: #e0e5ec;
        --text-color: #333333;
        --primary-color: #4c68ff;
        --primary-light: #7c90ff;
        --primary-dark: #3a50cc;
        --secondary-bg: #e0e5ec;
        
        /* New Action Colors */
        --success-color: #008069;
        --warning-color: #f7941d;

        /* Glass & Lines */
        --glass-color: rgba(255, 255, 255, 0.4);
        --card-glass: rgba(255, 255, 255, 0.65);
        --line-color: rgba(0, 0, 0, 0.07);
        --star-color: #E5B500;
        --toggle-size: 4rem;
        --border-radius: 20px;
        --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

        /* Neumorphic Shadows (Light) */
        --shadow-light-top: -6px -6px 12px #ffffff;
        --shadow-light-bottom: 6px 6px 12px rgba(0, 0, 0, 0.15);
        --shadow-inset-light: inset 2px 2px 5px rgba(0, 0, 0, 0.1), inset -2px -2px 5px #ffffff;
        --card-shadow: 0 10px 25px rgba(0,0,0,0.1);
        
        --highlight-light: #ffffff;
        --shadow-dark: #a3b1c6;
        --active-color: #4c68ff; 
    }

    /* Dark Theme (Nova Cosmic) */
    [data-theme="dark"] {
        --bg-color: #0a0a1a;
        --text-color: #f0f3ff;
        --primary-color: #6940c7;
        --primary-light: #a78bfa;
        --primary-dark: #6620d4;
        --secondary-bg: #0f0f23;
        
        /* Vibrant Action Colors for Dark Mode */
        --success-color: #10b981;
        --warning-color: #f59e0b;

        /* Glass & Lines */
        --glass-color: rgba(15, 25, 45, 0.7);
        --card-glass: rgba(20, 30, 55, 0.8);
        --line-color: rgba(139, 92, 246, 0.2);
        --star-color: #c084fc;
        
        /* Neumorphic Shadows (Cosmic Dark) */
        --shadow-light-top: -6px -6px 12px rgba(255,255,255,0.02);
        --shadow-light-bottom: 6px 6px 12px rgba(0, 0, 0, 0.5);
        --shadow-inset-light: inset 2px 2px 5px rgba(0, 0, 0, 0.3), inset -2px -2px 5px rgba(255,255,255,0.02);
        --card-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        
        --highlight-light: #1e1a3a;
        --shadow-dark: #03030c;
        --active-color: #8b5cf6;
    }
    
    /* --- 2. Base Setup --- */
    body {
        font-family: var(--font-stack);
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden; 
        transition: background 0.4s ease, color 0.4s ease;
    }

    /* --- 3. Main App Container (Glassmorphic Elevated) --- */
    .main-app-container {
        width: 95%;
        max-width: 1400px; 
        height: 90vh;
        padding: 30px;
        background: var(--card-glass);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--line-color);
        border-radius: var(--border-radius);
        
        /* Deep elevation shadow */
        box-shadow: var(--card-shadow);
        
        display: flex;
        flex-direction: column;
        transition: all 0.4s ease;
    }

    h1 {
        color: var(--active-color);
        font-size: 1.8em;
        margin: 0 0 10px 0;
        text-shadow: 1px 1px 2px var(--shadow-dark), -1px -1px 2px var(--highlight-light);
        transition: color 0.3s ease;
    }

    p {
        color: var(--text-color);
        opacity: 0.6;
        font-size: 0.9em;
        margin-bottom: 20px;
    }

    /* --- 4. Layout Wrapper --- */
    .content-wrapper {
        display: flex;
        flex-grow: 1;
        gap: 20px;
        min-height: 0; 
    }

    /* --- 5. Chat Embed Area (Recessed) --- */
    .chat-embed-area {
        flex-grow: 1;
        border-radius: 15px;
        overflow: hidden;
        background-color: var(--secondary-bg);
        position: relative;
        
        /* Neumorphic Inset */
        box-shadow: var(--shadow-inset-light);
        transition: background-color 0.4s ease;
    }

    .chat-embed-area iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }

    /* --- 6. GIF Sidebar Styles (Recessed) --- */
    .gif-sidebar {
        width: 320px;
        border-radius: 15px;
        padding: 15px;
        background-color: var(--secondary-bg);
        display: flex;
        flex-direction: column;
        gap: 15px;
        
        /* Neumorphic Inset */
        box-shadow: var(--shadow-inset-light);
        transition: background-color 0.4s ease;
    }

    .gif-search-controls {
        display: flex;
        gap: 10px;
    }

    .search-input-wrapper {
        position: relative;
        flex-grow: 1;
        display: flex;
    }

    #gif-search-bar {
        width: 100%;
        padding: 10px 30px 10px 10px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: var(--bg-color);
        color: var(--text-color);
        
        /* Deep input recess */
        box-shadow: var(--shadow-inset-light);
        outline: none;
        transition: all 0.3s ease;
    }

    #gif-search-bar:focus {
        border-bottom: 2px solid var(--active-color);
    }
    
    #gif-search-bar::placeholder {
        color: var(--text-color);
        opacity: 0.5;
    }

    #clear-search-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        color: var(--text-color);
        opacity: 0.5;
        cursor: pointer;
        font-size: 14px;
        display: none;
        padding: 5px;
    }

    #clear-search-btn:hover {
        opacity: 1;
        color: var(--active-color);
    }

    #gif-search-btn {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: var(--primary-color);
        color: #ffffff;
        cursor: pointer;
        font-weight: bold;
        
        /* Extruded Button */
        box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
        transition: all 0.2s ease;
    }

    #gif-search-btn:hover {
        background: var(--primary-light);
        transform: translateY(-1px);
    }

    #gif-search-btn:active {
        transform: translateY(1px);
        box-shadow: var(--shadow-inset-light);
    }

    #gif-container {
        flex-grow: 1;
        overflow-y: auto;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        align-content: flex-start;
        padding-bottom: 10px;
    }

    #gif-container::-webkit-scrollbar { width: 6px; }
    #gif-container::-webkit-scrollbar-track { background: transparent; }
    #gif-container::-webkit-scrollbar-thumb { background: var(--active-color); border-radius: 10px; opacity: 0.4; }

    .gif-item {
        width: 135px;
        height: 100px; 
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.3s, box-shadow 0.2s;
        background-color: var(--bg-color);
        object-fit: cover;
        opacity: 0; 
    }

    .gif-item.in-sight {
        opacity: 1;
    }

    .gif-item:hover {
        transform: scale(1.05);
        box-shadow: var(--shadow-light-bottom);
    }

    .gif-instruction {
        text-align: center;
        font-size: 0.85em;
        color: var(--text-color);
        opacity: 0.6;
        font-weight: bold;
        padding-top: 5px;
        margin-top: auto; 
    }

    /* --- 7. Footer Buttons --- */
    .footer-actions {
        margin-top: 25px;
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        flex-wrap: wrap;
    }

    .nav-button {
        padding: 12px 20px;
        font-size: 0.95em;
        font-weight: bold;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        text-decoration: none;

        /* Extruded Buttons */
        box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
    }

    .nav-button:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
    }

    .nav-button:active {
        transform: translateY(1px);
        box-shadow: var(--shadow-inset-light);
    }

    .back-button { background-color: var(--primary-color); }
    .refresh-button { background-color: var(--success-color); }
    .fullscreen-button { background-color: var(--warning-color); }

    /* --- 8. Toast Notification --- */
    #toast-container {
        visibility: hidden;
        min-width: 300px;
        background-color: var(--primary-color);
        color: #fff;
        text-align: center;
        border: 1px solid var(--line-color);
        border-radius: 12px;
        padding: 16px;
        position: fixed;
        z-index: 1000;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        box-shadow: var(--card-shadow);
        font-size: 0.95em;
        line-height: 1.5;
        opacity: 0;
        transition: opacity 0.5s, top 0.5s;
    }

    #toast-container.show {
        visibility: visible;
        opacity: 1;
        top: 50px;
    }

    @media (max-width: 800px) {
        .content-wrapper { flex-direction: column; }
        .gif-sidebar { width: auto; height: 250px; }
    }
</style>
</head>
<body>

    <script>
        (function() {
            try {
                const storedTheme = localStorage.getItem('theme');
                if (storedTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            } catch (e) {}
        })();
    </script>

    <div class="main-app-container">
        <h1>NovaGG | Community Chat</h1>
        <p>For the best experience, we recommend using the fullscreen option, especially on Chromebooks.</p>
        
        <div class="content-wrapper">
            
            <div class="chat-embed-area">
                <iframe id="chatFrame" src="/pages/chat_embed"></iframe>
            </div>
            
            <div class="gif-sidebar">
                <div class="gif-search-controls">
                    <div class="search-input-wrapper">
                        <input type="text" id="gif-search-bar" placeholder="Search GIFs...">
                        <button id="clear-search-btn" aria-label="Clear Search">✖</button>
                    </div>
                    <button id="gif-search-btn">🔍</button>
                </div>
                
                <div id="gif-container"></div>
                
                <div class="gif-instruction">Click a GIF to share!</div>
            </div>

        </div>
        
        <div class="footer-actions">
            <button class="nav-button back-button" onclick="redirectToApp()">
                ← Back to App
            </button>
            <button class="nav-button refresh-button" onclick="refreshChat()">
                ↻ Refresh Chat
            </button>
            <button class="nav-button fullscreen-button" onclick="toggleFullscreen()">
                ⛶ Fullscreen
            </button>
        </div>
    </div>

    <div id="toast-container"></div>
    
    <script>
        // --- Navigation ---
        function redirectToApp() {
            window.manualExitIntent = true; 
            window.location.href = '../'; 
        }
        
        function refreshChat() {
            const iframe = document.getElementById('chatFrame');
            if (iframe) {
                iframe.src = iframe.src; 
                showToast("Chat refreshed!");
            }
        }

        function toggleFullscreen() {
            const chatFrame = document.getElementById('chatFrame');
            if (!document.fullscreenElement) {
                if (chatFrame.requestFullscreen) chatFrame.requestFullscreen();
                else if (chatFrame.mozRequestFullScreen) chatFrame.mozRequestFullScreen();
                else if (chatFrame.webkitRequestFullscreen) chatFrame.webkitRequestFullscreen();
                else if (chatFrame.msRequestFullscreen) chatFrame.msRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            }
        }

        function showToast(message, duration = 6000) {
            const toast = document.getElementById("toast-container");
            toast.textContent = message;
            toast.className = "show";
            setTimeout(function(){ 
                toast.className = toast.className.replace("show", ""); 
            }, duration);
        }

        // --- GIF Search & Sight-Based Logic ---
        let currentPos = '';
        let isFetchingGifs = false;

        const searchBar = document.getElementById('gif-search-bar');
        const clearBtn = document.getElementById('clear-search-btn');
        const searchBtn = document.getElementById('gif-search-btn');
        const gifContainer = document.getElementById('gif-container');

        // Observer to hide/show based on sight
        const gifObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const img = entry.target;
                if (entry.isIntersecting) {
                    if (img.dataset.src) {
                        img.src = img.dataset.src;
                        img.classList.add('in-sight');
                    }
                } else {
                    img.src = ''; // Unload from memory
                    img.classList.remove('in-sight');
                }
            });
        }, {
            root: gifContainer,
            rootMargin: '150px' // Load slightly before they enter the view
        });

        searchBar.addEventListener('input', () => {
            clearBtn.style.display = searchBar.value.length > 0 ? 'block' : 'none';
        });

        clearBtn.addEventListener('click', () => {
            searchBar.value = '';
            clearBtn.style.display = 'none';
            searchBar.focus();
            gifContainer.innerHTML = ''; 
        });

        searchBtn.addEventListener('click', () => searchGifs(false));
        searchBar.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchGifs(false);
        });

        gifContainer.addEventListener('scroll', () => {
            if (gifContainer.scrollTop + gifContainer.clientHeight >= gifContainer.scrollHeight - 50) {
                if (!isFetchingGifs && currentPos) {
                    searchGifs(true);
                }
            }
        });

        async function searchGifs(loadMore = false) {
            const query = searchBar.value;
            
            if (!query || isFetchingGifs) return;
            isFetchingGifs = true;

            if (!loadMore) {
                currentPos = '';
                gifContainer.innerHTML = '<div style="width: 100%; text-align: center;">Searching...</div>';
            }

            try {
                const url = `https://g.tenor.com/v1/search?q=${query}&key=LIVDSRZULELA&limit=20&pos=${currentPos}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (!loadMore) {
                    gifContainer.innerHTML = '';
                }

                if (!data.results || data.results.length === 0) {
                    if (!loadMore) gifContainer.innerHTML = '<div style="width: 100%; text-align: center;">No GIFs found.</div>';
                    isFetchingGifs = false;
                    return;
                }

                currentPos = data.next;

                data.results.forEach(gifData => {
                    const formats = gifData.media_formats || (gifData.media && gifData.media[0]);
                    if (!formats || !formats.gif) return;

                    const img = document.createElement('img');
                    const realUrl = formats.tinygif ? formats.tinygif.url : formats.gif.url;
                    
                    img.className = 'gif-item';
                    img.dataset.src = realUrl; // Store URL for observer
                    img.title = "Click to copy!";

                    img.addEventListener('click', () => {
                        copyToClipboard(formats.gif.url);
                    });

                    gifObserver.observe(img);
                    gifContainer.appendChild(img);
                });
            } catch (error) {
                if (!loadMore) {
                    gifContainer.innerHTML = '<div style="width: 100%; text-align: center; color: red;">Error fetching GIFs.</div>';
                }
                console.error(error);
            }
            isFetchingGifs = false;
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast("Copied! Paste in chat (Ctrl+V) to send", 4000);
                }).catch(err => {
                    fallbackCopyTextToClipboard(text);
                });
            } else {
                fallbackCopyTextToClipboard(text);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.top = "-9999px";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast("Copied! Paste in chat (Ctrl+V) to send", 4000);
                }
            } catch (err) {
                console.error('Fallback copy failed: ', err);
            }
            document.body.removeChild(textArea);
        }

        // --- Initialization ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                showToast("NOTICE: Usernames & Passwords are Case Sensitive! If you don't have an account, please use Guest Mode.");
            }, 500);

            searchBar.value = 'IShowSpeed';
            clearBtn.style.display = 'block';
            searchGifs(false);
        });
    </script>
</body>
</html>
