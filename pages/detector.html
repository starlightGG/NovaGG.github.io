<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Plagiarism Analyzer</title>
<style>
    /* --- 1. CORE VARIABLES (Light Neumorphic & Nova Cosmic) --- */
    :root {
        /* Light Theme (Default) */
        --bg-color: #e0e5ec;
        --text-color: #333333;
        --text-secondary: #555555;
        --primary-color: #4c68ff;
        --secondary-bg: #e0e5ec;
        
        /* Action Colors (Mapped from your accents) */
        --danger-color: #d93025;
        --danger-bg: rgba(217, 48, 37, 0.15);
        --success-color: #1e8e3e;
        --warning-color: #f9ab00;
        
        /* Glass & Lines */
        --glass-color: rgba(255, 255, 255, 0.4);
        --card-glass: rgba(224, 229, 236, 0.8);
        --line-color: rgba(0, 0, 0, 0.07);
        --border-radius: 20px;
        --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

        /* Neumorphic Shadows (Light) */
        --shadow-light-top: -6px -6px 12px #ffffff;
        --shadow-light-bottom: 6px 6px 12px rgba(0, 0, 0, 0.15);
        --shadow-inset-light: inset 2px 2px 5px rgba(0, 0, 0, 0.1), inset -2px -2px 5px #ffffff;
        
        --highlight-light: #ffffff;
        --shadow-dark: #a3b1c6;
        --active-color: #4c68ff;
    }

    /* Dark Theme (Nova Cosmic) */
    [data-theme="dark"] {
        --bg-color: #0a0a1a;
        --text-color: #f0f3ff;
        --text-secondary: #94a3b8;
        --primary-color: #6940c7;
        --secondary-bg: #0f0f23;
        
        /* Action Colors (Cosmic Dark) */
        --danger-color: #ff6b6b;
        --danger-bg: rgba(255, 107, 107, 0.15);
        --success-color: #4ade80;
        --warning-color: #fbbf24;

        /* Glass & Lines */
        --glass-color: rgba(15, 25, 45, 0.7);
        --card-glass: rgba(20, 30, 55, 0.8);
        --line-color: rgba(139, 92, 246, 0.2);
        
        /* Neumorphic Shadows (Cosmic Dark) */
        --shadow-light-top: -6px -6px 12px rgba(255,255,255,0.02);
        --shadow-light-bottom: 6px 6px 12px rgba(0, 0, 0, 0.5);
        --shadow-inset-light: inset 2px 2px 5px rgba(0, 0, 0, 0.3), inset -2px -2px 5px rgba(255,255,255,0.02);
        
        --highlight-light: #1e1a3a;
        --shadow-dark: #03030c;
        --active-color: #8b5cf6;
    }

    /* --- 2. GLOBAL STYLES --- */
    * {
        box-sizing: border-box;
    }

    body { 
        font-family: var(--font-stack); 
        background-color: var(--bg-color); 
        color: var(--text-color); 
        padding: 20px; 
        max-width: 800px; 
        margin: auto; 
        line-height: 1.6; 
        transition: background-color 0.4s ease, color 0.4s ease;
    }

    h1 { 
        text-align: center; 
        margin-bottom: 5px; 
        color: var(--active-color);
        text-shadow: 1px 1px 2px var(--shadow-dark), -1px -1px 2px var(--highlight-light);
    }
    
    .subtitle { 
        text-align: center; 
        margin-bottom: 30px; 
        color: var(--text-secondary); 
    }

    /* --- 3. NEUMORPHIC UTILITIES --- */
    .neu-outset {
        background: var(--bg-color);
        box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
        border-radius: 12px;
        transition: all 0.3s ease;
    }

    .neu-inset {
        background: var(--secondary-bg);
        box-shadow: var(--shadow-inset-light);
        border-radius: 12px;
        transition: all 0.3s ease;
    }

    /* --- 4. INPUTS AND BUTTONS --- */
    textarea { 
        width: 100%; 
        height: 200px; 
        margin-bottom: 20px; 
        padding: 20px; 
        font-family: inherit; 
        border: 1px solid transparent; 
        border-radius: 12px;
        outline: none; 
        color: var(--text-color); 
        resize: vertical;
        font-size: 16px;
        background-color: var(--bg-color);
        box-shadow: var(--shadow-inset-light);
        transition: border-color 0.3s ease, background-color 0.4s ease;
    }
    
    textarea:focus {
        border-bottom: 2px solid var(--active-color);
    }

    .button-group {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
    }

    button.action-btn { 
        padding: 15px 20px; 
        font-size: 16px; 
        cursor: pointer; 
        color: var(--text-color); 
        background-color: var(--bg-color);
        border: none; 
        font-weight: bold; 
        flex: 1;
        outline: none;
        border-radius: 12px;
        box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
        transition: all 0.2s ease;
    }

    button.action-btn:hover:not(:disabled) {
        color: var(--active-color);
        transform: translateY(-2px);
    }
    
    button.action-btn:active:not(:disabled) { 
        box-shadow: var(--shadow-inset-light); 
        transform: translateY(0);
    }
    
    button.action-btn:disabled { 
        opacity: 0.5; 
        cursor: not-allowed; 
        box-shadow: none;
    }

    /* --- 5. RESULTS DASHBOARD --- */
    #results { 
        display: none; 
        padding: 30px; 
        margin-top: 20px; 
        border-radius: var(--border-radius);
    }
    
    .score-dashboard { 
        display: flex; 
        justify-content: space-around; 
        margin-bottom: 30px; 
    }
    
    .score-box { 
        text-align: center; 
        padding: 20px; 
        width: 35%; 
        border-radius: 50%; 
        aspect-ratio: 1; 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
        background: var(--bg-color);
        box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
    }
    
    .score-number { font-size: 3.5em; font-weight: bold; margin: 0; }
    .score-label { font-size: 1em; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; margin-bottom: 5px; color: var(--text-secondary);}
    
    /* Semantic Typography Colors */
    .color-red { color: var(--danger-color); }
    .color-orange { color: var(--warning-color); }
    .color-green { color: var(--success-color); }

    /* --- 6. DATA ROWS & HIGHLIGHTS --- */
    .section-title { 
        font-size: 1.2em; 
        font-weight: bold; 
        margin-bottom: 15px; 
        margin-top: 30px; 
        padding-left: 10px; 
        border-left: 4px solid var(--active-color); 
    }
    
    .data-row { margin-bottom: 15px; padding: 20px; }
    .data-label { font-weight: bold; font-size: 1em; margin-bottom: 10px; color: var(--text-secondary); }
    
    .highlight-plag { 
        font-weight: bold; 
        color: var(--danger-color); 
        background-color: var(--danger-bg); 
        padding: 2px 4px; 
        border-radius: 4px; 
        border-bottom: 2px solid var(--danger-color);
        transition: background-color 0.4s ease;
    }
    
    .original-passage-box {
        padding: 15px; 
        margin-bottom: 20px; 
        white-space: pre-wrap; 
        line-height: 1.8;
        font-size: 0.95em;
        background-color: var(--secondary-bg);
        box-shadow: var(--shadow-inset-light);
        border-radius: 12px;
    }

    /* --- 7. QUOTES & SOURCES --- */
    .source-item { 
        margin-bottom: 15px; 
        padding-bottom: 15px; 
        border-bottom: 1px solid var(--line-color); 
    }
    
    .source-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    
    .source-link { 
        color: var(--danger-color); 
        font-weight: bold; 
        word-break: break-all; 
        margin-bottom: 5px; 
    }
    
    .source-link a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
    .source-link a:hover { opacity: 0.8; }
    
    .source-quote { 
        font-style: italic; 
        padding: 12px; 
        border-left: 3px solid var(--danger-color); 
        font-size: 0.95em; 
        color: var(--text-secondary); 
    }
    
    .tag-clean { 
        display: inline-block; 
        padding: 8px 16px; 
        border-radius: 20px; 
        font-weight: bold; 
        font-size: 0.9em; 
        color: var(--success-color);
        box-shadow: var(--shadow-inset-light);
    }

    /* --- 8. MODAL UI --- */
    .modal-overlay {
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%;
        background: var(--card-glass);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        display: none; 
        align-items: center; 
        justify-content: center; 
        z-index: 1000;
        opacity: 0; 
        transition: opacity 0.3s ease;
    }
    
    .modal-overlay.show { display: flex; opacity: 1; }
    
    .modal-box { 
        background: var(--bg-color);
        padding: 40px; 
        max-width: 400px; 
        width: 80%; 
        text-align: center; 
        border-radius: var(--border-radius);
        box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
        border: 1px solid var(--line-color);
    }
    
    .modal-box h3 { margin-top: 0; font-size: 1.5em; margin-bottom: 15px; color: var(--active-color); }
    .modal-box p { margin-bottom: 25px; color: var(--text-secondary); }
    
    .modal-btn { 
        background: var(--bg-color);
        padding: 10px 30px; 
        font-size: 16px; 
        font-weight: bold; 
        border: none; 
        outline: none; 
        color: var(--text-color); 
        cursor: pointer; 
        border-radius: 8px; 
        box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
        transition: all 0.2s ease;
    }
    
    .modal-btn:hover { color: var(--active-color); transform: translateY(-2px); }
    .modal-btn:active { box-shadow: var(--shadow-inset-light); transform: translateY(0); }
</style>
</head>
<body>

    <h1>Originality Analyzer</h1>
    <p class="subtitle">Paste your text below for a forensic breakdown of AI generation and plagiarism.</p>
    
    <textarea id="textInput" class="neu-inset" placeholder="Paste the essay or text here..."></textarea>
    
    <div class="button-group">
        <button id="analyzeBtn" class="neu-outset action-btn" onclick="analyzeText()" style="flex: 2; color: var(--accent-green);">Analyze Text</button>
        <button id="clearBtn" class="neu-outset action-btn" onclick="clearAll()">Clear</button>
    </div>

    <div id="results" class="neu-outset">
        <div class="score-dashboard">
            <div class="score-box neu-inset">
                <p class="score-label">Plagiarized</p>
                <h2 id="plagScore" class="score-number">0%</h2>
            </div>
            <div class="score-box neu-inset">
                <p class="score-label">AI-Generated</p>
                <h2 id="aiScore" class="score-number">0%</h2>
            </div>
        </div>

        <div class="section-title">Plagiarism Report</div>
        <div class="data-row neu-inset">
            <div id="highlightContainer" style="display: none;">
                <div class="data-label">Analyzed Text (Stolen Content Bolded):</div>
                <div id="highlightedText" class="neu-inset original-passage-box"></div>
            </div>

            <div id="sourcesList"></div>
            <div class="data-label" style="margin-top: 15px;">Summary:</div>
            <div id="plagSummaryText"></div>
        </div>
        
        <div class="section-title">AI Detection Report</div>
        <div class="data-row neu-inset">
            <div class="data-label">Summary:</div>
            <div id="aiSummaryText"></div>
        </div>

        <button class="neu-outset action-btn" onclick="copyReport()" style="width: 100%; margin-top: 20px;">Copy Report to Clipboard</button>
    </div>

    <div id="customModal" class="modal-overlay">
        <div class="modal-box neu-outset">
            <h3 id="modalTitle">Notice</h3>
            <p id="modalMessage">Message goes here.</p>
            <button class="neu-outset modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        // HARDCODED API KEY
        const API_KEY_URL = "../txt/token.txt";
        let GROQ_API_KEY = null;
        const API_URL = "https://api.groq.com/openai/v1/chat/completions"; 
                async function loadApiKey() {
            try {
                const response = await fetch(API_KEY_URL);
                if (!response.ok) throw new Error(`HTTP Status: ${response.status}`);
                let rawKey = (await response.text()).trim();
                rawKey = atob(rawKey);
                GROQ_API_KEY = `gsk_${rawKey}`;
                if (GROQ_API_KEY.length < 10) throw new Error("Key is too short or invalid.");
                
            } catch (error) {
                alert('API Key Error:', error);
            }
                }
                loadApiKey();
        // Spam Protection Variables
        let clickHistory = [];
        let isCooldown = false;
        let lastReportData = null; // Store data for copying

        // --- Iframe Theme Logic ---
        function applyTheme() {
            const currentTheme = localStorage.getItem('theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }

        applyTheme();

        window.addEventListener('storage', (event) => {
            if (event.key === 'theme') {
                applyTheme();
            }
        });

        // --- Custom Modal Logic ---
        function showModal(title, message) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = message;
            document.getElementById('customModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('customModal').classList.remove('show');
        }

        // --- Quality of Life Buttons ---
        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('results').style.display = 'none';
            lastReportData = null;
        }

function copyReport() {
    if (!lastReportData) return;

    const reportText = `
ORIGINALITY REPORT
------------------
Plagiarized: ${lastReportData.plagiarism_percent}%
AI-Generated: ${lastReportData.ai_percent}%

PLAGIARISM SUMMARY:
${lastReportData.plagiarism_summary}

AI DETECTION SUMMARY:
${lastReportData.ai_summary}
    `.trim();

    // 1. Try the Modern Clipboard API
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(reportText)
            .then(() => showModal("Success!", "Report copied to clipboard!"))
            .catch(() => fallbackCopy(reportText)); // Fallback on failure
    } else {
        // 2. Immediate fallback for insecure contexts (HTTP)
        fallbackCopy(reportText);
    }

    // Helper function for the "textarea" trick
    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        
        // Ensure textarea is off-screen so the page doesn't jump
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        textArea.style.top = "0";
        
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();

        try {
            const successful = document.execCommand('copy');
            if (successful) {
                showModal("Success!", "Report copied to clipboard!");
            } else {
                showModal("Error", "Failed to copy report.");
            }
        } catch (err) {
            showModal("Error", "Failed to copy report.");
        }

        document.body.removeChild(textArea);
    }
}

        // --- Escape RegExp Helper ---
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // --- Analysis Logic ---
        function getScoreColorClass(percentage) {
            if (percentage >= 50) return "color-red";
            if (percentage >= 20) return "color-orange";
            return "color-green";
        }

        async function analyzeText() {
            if (isCooldown) return; 

            const btn = document.getElementById('analyzeBtn');
            const text = document.getElementById('textInput').value.trim();
            const resultsDiv = document.getElementById('results');

            // Spam Protection
            const now = Date.now();
            clickHistory = clickHistory.filter(time => now - time < 10000);

            if (clickHistory.length >= 2) {
                isCooldown = true;
                btn.disabled = true;
                showModal("Spam Protection", "You are analyzing too fast! Please wait 10 seconds to save API limits.");
                
                let timeLeft = 10;
                btn.innerText = `Cooldown (${timeLeft}s)`;
                
                const countdown = setInterval(() => {
                    timeLeft--;
                    if (timeLeft > 0) {
                        btn.innerText = `Cooldown (${timeLeft}s)`;
                    } else {
                        clearInterval(countdown);
                        isCooldown = false;
                        btn.disabled = false;
                        btn.innerText = "Analyze Text";
                        clickHistory = []; 
                    }
                }, 1000);
                
                return; 
            }

            clickHistory.push(now);

            if (!text) {
                showModal("Wait a second!", "Please paste some text into the box before analyzing.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Analyzing...";
            resultsDiv.style.display = "none";

const systemPrompt = `You are a strict forensic text analyst. 
Evaluate the user's text for BOTH plagiarism and AI generation independently.

Since you are evaluating against fetched data, use only verified sources. DO NOT guess URLs. If a source is unknown, set "source_url" to null.

CRITERIA FOR PLAGIARISM & SOURCING:
1. Only cite a source if you can verify the text overlaps.
2. If no plagiarism is detected, set "sources" to an empty array [].
3. EXACT MATCH RULE: The "matched_quote" MUST be a verbatim, unbroken substring directly from the user's input. Do not alter capitalization, punctuation, or spacing. Do not use ellipses (...). If you change even one character, the frontend highlighting UI will break.

CRITERIA FOR AI DETECTION:
Evaluate the text strictly on the following human vs. AI markers:
1. Imperfections: Humans make minor typos, phonetic misspellings, and grammatical slip-ups. AI text is typically flawless and highly sterile.
2. Formatting Quirks: Look for human artifacts like double spaces after periods ("  "), inconsistent line breaks, or erratic use of punctuation. AI uses sanitized, perfect formatting.
3. Capitalization: Humans occasionally forget to capitalize proper nouns or beginnings of sentences in casual text. AI perfectly adheres to title case and sentence case.
4. Rhythm & Vocabulary (Burstiness/Perplexity): Humans vary sentence length drastically (short, punchy sentences mixed with run-ons). AI uses highly predictable, symmetrical paragraph structures and crutch words ("Furthermore", "Delve", "Crucial", "In conclusion").

You MUST respond ONLY with a raw JSON object in this exact format. No markdown formatting blocks (\`\`\`), no conversational text.

{
    "analysis_reasoning": "<1-paragraph analyzing the text for human imperfections vs. AI sterility>",
    "plagiarism_percent": <number 0 to 100>,
    "ai_percent": <number 0 to 100 representing probability it was AI generated>,
    "plagiarism_summary": "<2-sentence explanation of your plagiarism verdict based on fetched sources>",
    "ai_summary": "<2-sentence explanation of your AI-generation verdict specifically citing grammar, formatting, spacing, or style markers>",
    "sources": [
        {
            "source_name": "<Title, author, or name of the source>",
            "source_url": "<The exact http/https URL, or null if uncertain>",
            "matched_quote": "<MUST be an exact, continuous, copy-pasted substring from the user's text. No alterations. No ellipses.>"
        }
    ]
}`;
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "groq/compound-mini", 
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: text }
                        ],
                        temperature: 0.1
                    })
                });

                if (!response.ok) {
                    throw new Error(`API returned status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.choices && data.choices.length > 0) {
                    let aiResponse = data.choices[0].message.content;
                    aiResponse = aiResponse.replace(/```json/g, "").replace(/```/g, "").trim();
                    const analysis = JSON.parse(aiResponse);
                    
                    lastReportData = analysis; // Save for copying
                    updateUI(analysis, text); 
                } else {
                    showModal("API Error", "Did not receive a valid response from the API.");
                }

            } catch (error) {
                console.error("API Error:", error);
                showModal("Connection Failed", "Failed to parse the API response. Make sure your hardcoded API key is correct.");
            }

            if (!isCooldown) {
                btn.disabled = false;
                btn.innerText = "Analyze Text";
            }
        }

        function updateUI(data, originalText) {
            const resultsDiv = document.getElementById('results');
            
            const plagScoreEl = document.getElementById('plagScore');
            const aiScoreEl = document.getElementById('aiScore');
            
            plagScoreEl.innerText = `${data.plagiarism_percent}%`;
            plagScoreEl.className = `score-number ${getScoreColorClass(data.plagiarism_percent)}`;
            
            aiScoreEl.innerText = `${data.ai_percent}%`;
            aiScoreEl.className = `score-number ${getScoreColorClass(data.ai_percent)}`;

            document.getElementById('plagSummaryText').innerText = data.plagiarism_summary;
            document.getElementById('aiSummaryText').innerText = data.ai_summary;

            const sourcesListEl = document.getElementById('sourcesList');
            const highlightContainer = document.getElementById('highlightContainer');
            const highlightedTextEl = document.getElementById('highlightedText');

            if (!data.sources || data.sources.length === 0) {
                sourcesListEl.innerHTML = `<div class="neu-inset tag-clean">✓ No external sources detected</div>`;
                highlightContainer.style.display = 'none';
            } else {
                let sourcesHTML = `<div class="data-label">Identified Sources & Quotes:</div>`;
                let markedUpText = originalText;

                data.sources.forEach(src => {
                    // LINK LOGIC: Use the direct URL provided by the AI, fallback to # if it hallucinated something weird
                    let href = src.source_url;
                    if (!/^https?:\/\//i.test(href)) {
                        href = "#"; 
                    }

                    sourcesHTML += `
                        <div class="source-item">
                            <div class="source-link">Source: <a href="${href}" target="_blank" ${href === "#" ? "style='pointer-events: none; text-decoration: none; color: inherit;'" : ""}>${src.source_name}</a></div>
                            <div class="source-quote neu-inset">"${src.matched_quote}"</div>
                        </div>
                    `;

                    if (src.matched_quote) {
                        const regex = new RegExp(escapeRegExp(src.matched_quote), 'gi');
                        markedUpText = markedUpText.replace(regex, match => `<span class="highlight-plag">${match}</span>`);
                    }
                });
                
                sourcesListEl.innerHTML = sourcesHTML;
                highlightedTextEl.innerHTML = markedUpText;
                highlightContainer.style.display = 'block';
            }

            resultsDiv.style.display = "block";
        }
    </script>

</body>
</html>
