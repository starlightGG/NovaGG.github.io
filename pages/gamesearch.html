    <style>
        /* ----- CORE VARIABLES (matches main.css exactly) ----- */
        :root {
            /* Light Theme (Default) */
            --bg-color: #e0e5ec;
            --text-color: #333333;
            --primary-color: #4c68ff;
            --primary-light: #7c90ff;
            --primary-dark: #3a50cc;
            --secondary-bg: #e0e5ec;
            --glass-color: rgba(255, 255, 255, 0.4);
            --card-glass: rgba(255, 255, 255, 0.65);
            --line-color: rgba(0, 0, 0, 0.07);
            --star-color: #E5B500;
            --toggle-size: 4rem;
            --border-radius: 20px;
            --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

            /* Neumorphic Shadows (Light) */
            --shadow-light-top: -6px -6px 12px #ffffff;
            --shadow-light-bottom: 6px 6px 12px rgba(0, 0, 0, 0.15);
            --shadow-inset-light: inset 2px 2px 5px rgba(0, 0, 0, 0.1), inset -2px -2px 5px #ffffff;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.1);
            --highlight-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --active-color: #4c68ff;

            /* extra semantic */
            --text-secondary: #666666;
            --fav-color: #e91e63;
            --danger-color: #ff4c4c;
        }

        /* Dark Theme (Nova cosmic) - fully defined but NOT toggled by UI */
        [data-theme="dark"] {
            --bg-color: #0a0a1a;
            --text-color: #f0f3ff;
            --primary-color: #6940c7;
            --primary-light: #a78bfa;
            --primary-dark: #6620d4;
            --secondary-bg: #0f0f23;
            --glass-color: rgba(15, 25, 45, 0.7);
            --card-glass: rgba(20, 30, 55, 0.8);
            --line-color: rgba(139, 92, 246, 0.2);
            --star-color: #c084fc;
            --shadow-light-top: -6px -6px 12px rgba(255,255,255,0.02);
            --shadow-light-bottom: 6px 6px 12px rgba(0, 0, 0, 0.5);
            --shadow-inset-light: inset 2px 2px 5px rgba(0, 0, 0, 0.3), inset -2px -2px 5px rgba(255,255,255,0.02);
            --card-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            --highlight-light: #1e1a3a;
            --shadow-dark: #03030c;
            --active-color: #8b5cf6;
            --text-secondary: #b0b0d0;
            --fav-color: #ff6b8b;
            --danger-color: #ff6b6b;
        }

        /* ----- GLOBAL RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .container {
            width: 100%;
            max-width: 520px;
            position: relative;
        }

        /* main game box */
        .box {
            padding: 30px 24px;
            border-radius: var(--border-radius);
            background: var(--bg-color);
            box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
            transition: background 0.2s, box-shadow 0.2s;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* controls: search + filter */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 28px;
        }

        #gsearchbar,
        #categoryFilter {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            font-size: 0.95rem;
            outline: none;
            box-shadow: var(--shadow-inset-light);
            transition: all 0.2s ease;
        }

        #gsearchbar:focus,
        #categoryFilter:focus {
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.12), inset -3px -3px 6px rgba(255,255,255,0.5);
        }

        /* section headers */
        .section-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 28px 0 14px 0;
            padding-bottom: 6px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--line-color);
            letter-spacing: -0.2px;
        }

        /* game wrapper (neumorphic card) */
        .game-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            margin: 14px 0;
            background: var(--bg-color);
            border-radius: 18px;
            box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), background 0.2s, box-shadow 0.2s;
        }

        .game-wrapper:hover {
            transform: translateY(-3px);
            box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.12), -8px -8px 16px rgba(255, 255, 255, 0.5);
        }

        .game-button {
            flex-grow: 1;
            text-align: left;
            padding: 16px 18px;
            border: none;
            background: transparent;
            font-family: var(--font-stack);
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            border-radius: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        .game-button:active {
            transform: scale(0.99);
        }

        /* action buttons (heart + remove) */
        .actions {
            display: flex;
            gap: 10px;
            padding-right: 16px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 15px;
            box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            transform: scale(1.08);
            color: var(--text-color);
        }

        .icon-btn:active {
            box-shadow: var(--shadow-inset-light);
            transform: scale(0.96);
        }

        .icon-btn.is-favorite {
            color: var(--fav-color);
            box-shadow: var(--shadow-inset-light);
        }

        .remove-btn {
            color: var(--danger-color);
            display: none;
        }

        .showing-recent .remove-btn {
            display: flex;
        }

        /* status message (plain text, no button) */
        #status-message {
            display: none;
            margin-top: 32px;
            text-align: center;
            padding: 16px 20px;
            background: var(--glass-color);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid var(--line-color);
        }

        /* empty state - just text, no link */
        #status-message.is-plain {
            cursor: default;
            box-shadow: var(--shadow-inset-light);
        }

        /* mobile polish */
        @media (max-width: 550px) {
            body { padding: 12px; }
            .box { padding: 20px 16px; }
            .game-button { font-size: 0.85rem; padding: 14px 12px; }
            .actions { gap: 8px; padding-right: 12px; }
            .icon-btn { width: 30px; height: 30px; font-size: 13px; }
        }

        /* scrollbar (optional) */
        ::-webkit-scrollbar {
            width: 6px;
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }
    </style>
</head>

<script>
    (function() {
        const glist = document.getElementById('glist');
        const searchBar = document.getElementById('gsearchbar');
        const categoryFilter = document.getElementById('categoryFilter');
        const statusMsg = document.getElementById('status-message');

        let favorites = JSON.parse(localStorage.getItem('favGames')) || [];
        let recents = JSON.parse(localStorage.getItem('recentGames')) || [];

        // 1. upgrade all .game-button to wrapper + actions
        const originalButtons = Array.from(document.querySelectorAll('.game-button'));
        const wrappers = [];

        originalButtons.forEach(btn => {
            const title = btn.getAttribute('data-game-title');
            const type = btn.getAttribute('data-game-type');
            const url = btn.getAttribute('data-url');
            if(!title) return;

            // create wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'game-wrapper';
            wrapper.dataset.gameTitle = title;
            wrapper.dataset.gameType = type;

            // actions container
            const actions = document.createElement('div');
            actions.className = 'actions';

            const heartBtn = document.createElement('button');
            heartBtn.className = `icon-btn ${favorites.includes(title) ? 'is-favorite' : ''}`;
            heartBtn.innerHTML = '<i class="fa-solid fa-heart"></i>';
            heartBtn.onclick = (e) => {
                e.stopPropagation();
                toggleFavorite(title, heartBtn);
            };

            const removeBtn = document.createElement('button');
            removeBtn.className = 'icon-btn remove-btn';
            removeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
            removeBtn.onclick = (e) => {
                e.stopPropagation();
                removeRecent(title);
            };

            actions.append(heartBtn, removeBtn);
            
            // replace button with wrapper
            btn.parentNode.insertBefore(wrapper, btn);
            wrapper.appendChild(btn);
            wrapper.appendChild(actions);

            // attach click event to original button
            btn.onclick = (e) => {
                e.stopPropagation();
                addToRecent(title);
                if(url && url !== '#') window.location.href = url;
            };

            wrappers.push(wrapper);
        });

        // capture original order (preserve headers + wrappers)
        const originalOrder = Array.from(glist.children).filter(child => 
            child.classList?.contains('game-wrapper') || child.classList?.contains('section-header')
        );

        // Helper functions
        function toggleFavorite(title, btn) {
            if (favorites.includes(title)) {
                favorites = favorites.filter(t => t !== title);
                btn.classList.remove('is-favorite');
            } else {
                favorites.push(title);
                btn.classList.add('is-favorite');
            }
            localStorage.setItem('favGames', JSON.stringify(favorites));
            if (categoryFilter.value === 'favorites') filterGames();
        }

        function addToRecent(title) {
            recents = recents.filter(t => t !== title);
            recents.unshift(title);
            if (recents.length > 20) recents.pop();
            localStorage.setItem('recentGames', JSON.stringify(recents));
        }

        function removeRecent(title) {
            recents = recents.filter(t => t !== title);
            localStorage.setItem('recentGames', JSON.stringify(recents));
            filterGames();
        }

        function filterGames() {
            const query = searchBar.value.trim().toUpperCase().replace(/[- ]/g, '');
            const mode = categoryFilter.value;
            let visibleCount = 0;
            const sectionCounts = {};

            // reorder DOM based on mode
            if (mode === 'recent') {
                glist.classList.add('showing-recent');
                // clear list
                while (glist.firstChild) glist.removeChild(glist.firstChild);
                // add recent games in order
                recents.forEach(recentTitle => {
                    const w = wrappers.find(wrap => wrap.dataset.gameTitle === recentTitle);
                    if (w) glist.appendChild(w);
                });
            } else {
                glist.classList.remove('showing-recent');
                while (glist.firstChild) glist.removeChild(glist.firstChild);
                originalOrder.forEach(node => glist.appendChild(node));
            }

            // filter visibility
            const allWrappers = Array.from(document.querySelectorAll('.game-wrapper'));
            allWrappers.forEach(w => {
                const title = w.dataset.gameTitle;
                const type = w.dataset.gameType;
                const cleanTitle = title.toUpperCase().replace(/[- ]/g, '');
                const matchesSearch = cleanTitle.includes(query);
                let matchesMode = true;
                if (mode === 'favorites') matchesMode = favorites.includes(title);
                if (mode === 'recent') matchesMode = recents.includes(title);

                if (matchesSearch && matchesMode) {
                    w.style.display = 'flex';
                    visibleCount++;
                    if (mode !== 'recent') {
                        sectionCounts[type] = (sectionCounts[type] || 0) + 1;
                    }
                } else {
                    w.style.display = 'none';
                }
            });

            // update headers visibility
            document.querySelectorAll('.section-header').forEach(header => {
                if (mode === 'recent') {
                    header.style.display = 'none';
                    return;
                }
                const sectionName = header.dataset.sectionName || '';
                const typeKey = sectionName.split(' ')[0].toLowerCase();
                if (sectionCounts[typeKey] > 0) {
                    header.style.display = 'block';
                    header.textContent = `${sectionName} (${sectionCounts[typeKey]})`;
                } else {
                    header.style.display = 'none';
                }
            });

            // show status message if needed (plain text, not clickable)
            statusMsg.style.display = 'none';
            statusMsg.classList.remove('is-plain');
            statusMsg.onclick = null;

            if (visibleCount === 0) {
                statusMsg.style.display = 'block';
                if (mode === 'favorites') {
                    statusMsg.textContent = "✨ No favorites yet. Tap the heart on any game to add.";
                } else if (mode === 'recent') {
                    statusMsg.textContent = "🕒 No recent games. Play something first!";
                } else {
                    statusMsg.textContent = "🔍 No results found for that search.";
                }
                statusMsg.classList.add('is-plain');
            }
        }
// ----- THEME PERSISTENCE (no toggle button, just storage & apply) -----
function applyTheme(theme) {
    if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('nova-theme', 'dark');
    } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('nova-theme', 'light');
    }
}

function loadSavedTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme== 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    } else if (savedTheme === 'light') {
        document.documentElement.removeAttribute('data-theme');
    } else {
        // optional: check system preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
        }
    }
}

// Call this when DOM loads
loadSavedTheme();
        searchBar.addEventListener('keyup', filterGames);
        categoryFilter.addEventListener('change', filterGames);
        filterGames();

    })();

</script>
