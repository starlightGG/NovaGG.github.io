<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Search Display</title>
    <script>
        /* Check localStorage before the body renders to prevent white flash */
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme == 'dark') {
              document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
<style>

    /* --- CORE VARIABLES (matches main.css) --- */
:root {
    /* Light Theme (Default) */
    --bg-color: #e0e5ec;
    --text-color: #333333;
    --primary-color: #4c68ff;
    --primary-light: #7c90ff;
    --primary-dark: #3a50cc;
    --secondary-bg: #e0e5ec;
    --glass-color: rgba(255, 255, 255, 0.4);
    --card-glass: rgba(255, 255, 255, 0.65);
    --line-color: rgba(0, 0, 0, 0.07);
    --star-color: #E5B500;
    --toggle-size: 4rem;
    --border-radius: 20px;
    --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

    /* Neumorphic Shadows (Light) */
    --shadow-light-top: -6px -6px 12px #ffffff;
    --shadow-light-bottom: 6px 6px 12px rgba(0, 0, 0, 0.15);
    --shadow-inset-light: inset 2px 2px 5px rgba(0, 0, 0, 0.1), inset -2px -2px 5px #ffffff;
    --card-shadow: 0 10px 25px rgba(0,0,0,0.1);
    
    --highlight-light: #ffffff;
    --shadow-dark: #a3b1c6;
    --active-color: #4c68ff; /* aligned with primary */
}

/* Dark Theme (matches main.css structure) */
[data-theme="dark"] {
    --bg-color: #0a0a1a;
    --text-color: #f0f3ff;
    --primary-color: #6940c7;
    --primary-light: #a78bfa;
    --primary-dark: #6620d4;
    --secondary-bg: #0f0f23;
    --glass-color: rgba(15, 25, 45, 0.7);
    --card-glass: rgba(20, 30, 55, 0.8);
    --line-color: rgba(139, 92, 246, 0.2);
    --star-color: #c084fc;
    
    --shadow-light-top: -6px -6px 12px rgba(255,255,255,0.02);
    --shadow-light-bottom: 6px 6px 12px rgba(0, 0, 0, 0.5);
    --shadow-inset-light: inset 2px 2px 5px rgba(0, 0, 0, 0.3), inset -2px -2px 5px rgba(255,255,255,0.02);
    --card-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    --highlight-light: #1e1a3a;
    --shadow-dark: #03030c;
    --active-color: #8b5cf6;
}

/* --- GLOBAL STYLES --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-stack);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    transition: background-color 0.3s ease, color 0.3s ease;
}

.display-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    padding: 2rem;
}

/* Neumorphic Circle - matches main.css shadow system */
.icon-circle {
    width: 100px;
    height: 100px;
    background: var(--bg-color);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: var(--shadow-light-bottom), var(--shadow-light-top);
    color: var(--primary-color);
    transition: all 0.3s ease;
}

.icon-circle:active {
    box-shadow: var(--shadow-inset-light);
}

.label {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-color);
    opacity: 0.9;
}

.info {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 1px;
    color: var(--text-color);
    opacity: 0.75;
}

svg {
    width: 40px;
    height: 40px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* Responsive */
@media (max-width: 600px) {
    .icon-circle {
        width: 80px;
        height: 80px;
    }
    svg {
        width: 32px;
        height: 32px;
    }
    .label {
        font-size: 1rem;
    }
    .info {
        font-size: 0.85rem;
    }
}
</style>
</head>
<body>

    <div class="display-container">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </div>
        <div class="label">Search</div>
        <div class = "info">Select a Server on top bar!</div>
    </div>

</body>
</html>
